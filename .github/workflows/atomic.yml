name: Atomic CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request: {}

concurrency:
  group: atomic-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ATOMIC_SYNTHETIC_NNUE_SHA256: 9CF054CA00B82AB53A34473DE52D1104AEDDAA19B2E7B24091B5E613AF485985
  ATOMIC_SYNTHETIC_V2_NNUE_SHA256: 4DEB05CFF79B5D5EBA51C560F64ED24224671C188B6C5DB27521033E587C87C6
  ATOMIC_SYNTHETIC_V3_NNUE_SHA256: 00E46223822D06D7927E884EEC10739BA19EF8DD82A6E262F627D361658080C2
  # The checkout becomes dirty with untracked test/build products before some
  # generator targets run. Bind every CI producer to the exact checked-out
  # commit instead of weakening the Makefile's clean-tree fallback.
  GIT_SHA_FULL: ${{ github.sha }}

jobs:
  native:
    name: Native ${{ matrix.compiler }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            comp: gcc
            cxx: g++
          - compiler: Clang
            comp: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.9'
      - name: Build portable x86-64
        working-directory: src
        run: make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} build
      - name: Network-free UCI and XBoard release smoke
        run: python3 tests/release_protocol_smoke.py --engine src/atomic-stockfish
      - name: C++ rule and shared-API units
        working-directory: src
        run: |
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-unit-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-api-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-nnue-incremental-tests.bin
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v2-backend-core-tests.bin
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v2-incremental-tests.bin
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v3-hm-oracle-tests
          python3 ../tests/atomic_v3_hm_differential.py --oracle ./atomic-v3-hm-oracle-tests.bin
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v3-capture-pair-tests
          python3 ../tests/atomic_v3_capture_pair_differential.py --oracle ./atomic-v3-capture-pair-tests.bin
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v3-king-blast-ep-tests
          python3 ../tests/atomic_v3_king_blast_ep_differential.py --oracle ./atomic-v3-king-blast-ep-tests.bin
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v3-blast-ring-tests
          python3 ../tests/atomic_v3_blast_ring_differential.py --oracle ./atomic-v3-blast-ring-tests.bin
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v3-full-refresh-tests
          python3 ../tests/atomic_v3_full_refresh_differential.py --oracle ./atomic-v3-full-refresh-tests.bin
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v3-numeric-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-wire-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-scalar-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-incremental-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-incremental-stress-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            ATOMIC_V3_SIMD_REQUIRED_ISA=scalar \
            atomic-v3-simd-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-syzygy-driver
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} legacy-atomic-v1-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-sink-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-manifest-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-manifest-reader-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-reader-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v3-trajectory-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-v3-private-staging-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} data-tools-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} data-generator
      - name: Functional data-generator gate (full on GCC, smoke on Clang)
        run: |
          python3 tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          mode=--smoke-only
          if [ "${{ matrix.comp }}" = gcc ]; then mode=; fi
          python3 tests/data_generator.py $mode \
            --generator src/atomic-stockfish-data-generator \
            --normal-engine src/atomic-stockfish \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256"
          python3 tests/atomic_v3_trajectory_producer.py \
            --generator src/atomic-stockfish-data-generator \
            --net "$RUNNER_TEMP/atomic-zero.nnue"
      - name: Dual Legacy V1 and AtomicNNUEV2 engine gate
        run: |
          python3 tests/create_synthetic_atomic_v2_nnue.py --output "$RUNNER_TEMP/atomic-v2.nnue"
          src/atomic-v2-backend-core-tests.bin "$RUNNER_TEMP/atomic-v2.nnue"
          src/atomic-v2-incremental-tests.bin --net "$RUNNER_TEMP/atomic-v2.nnue" --operations 4096 --full-refresh-interval 1
          python3 tests/nnue_v2_modes.py \
            --engine src/atomic-stockfish \
            --legacy-net "$RUNNER_TEMP/atomic-zero.nnue" \
            --legacy-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256" \
            --v2-net "$RUNNER_TEMP/atomic-v2.nnue"
      - name: AtomicNNUEV2 pure data-generator smoke
        run: |
          python3 tests/atomic_v2_generator_smoke.py \
            --generator src/atomic-stockfish-data-generator \
            --net "$RUNNER_TEMP/atomic-v2.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_V2_NNUE_SHA256"
      - name: AtomicNNUEV3 production dispatcher acceptance
        run: >-
          python3 tests/nnue_v3_modes.py
          --engine src/atomic-stockfish
          --v3-net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          --v3-sha256 "$ATOMIC_SYNTHETIC_V3_NNUE_SHA256"
          --v2-net "$RUNNER_TEMP/atomic-v2.nnue"
      - name: AtomicNNUEV3 pure data-generator smoke
        if: matrix.comp == 'gcc'
        run: >-
          python3 tests/atomic_v3_generator_smoke.py
          --generator src/atomic-stockfish-data-generator
          --net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          --expected-net-sha256 "$ATOMIC_SYNTHETIC_V3_NNUE_SHA256"
      - name: Atomic Syzygy source/domain contract
        run: python3 tests/atomic_syzygy.py --contract-only
      - name: Atomic and Atomic960 perft
        run: ATOMIC_PERFT_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" bash tests/perft.sh src/atomic-stockfish
      - name: Atomic search regressions
        run: python3 tests/atomic_search.py --candidate src/atomic-stockfish --use-nnue false
      - name: XBoard protocol
        run: >-
          python3 tests/xboard_protocol.py
          --candidate src/atomic-stockfish
          --eval-file "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"

  nnue-v2-simd:
    name: AtomicNNUEV2 ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # general-64 exercises the scalar implementation; the other two lock
        # the production BMI2 and AVX2 vector paths to the same fixture.
        arch: [general-64, x86-64-bmi2, x86-64-avx2]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build optimized engine and AtomicNNUEV2 tests
        run: |
          make -C src -j2 ARCH=${{ matrix.arch }} build
          make -C src -j2 ARCH=${{ matrix.arch }} atomic-v2-backend-core-tests.bin
          make -C src -j2 ARCH=${{ matrix.arch }} atomic-v2-incremental-tests.bin
      - name: Authenticated three-backend SIMD gate
        run: |
          python3 tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          python3 tests/create_synthetic_atomic_v2_nnue.py --output "$RUNNER_TEMP/atomic-v2.nnue"
          python3 tests/create_synthetic_atomic_v3_nnue.py --output "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          src/atomic-v2-backend-core-tests.bin "$RUNNER_TEMP/atomic-v2.nnue"
          src/atomic-v2-incremental-tests.bin \
            --net "$RUNNER_TEMP/atomic-v2.nnue" \
            --operations 4096 \
            --full-refresh-interval 1
          python3 tests/nnue_v2_modes.py \
            --engine src/atomic-stockfish \
            --legacy-net "$RUNNER_TEMP/atomic-zero.nnue" \
            --legacy-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256" \
            --v2-net "$RUNNER_TEMP/atomic-v2.nnue" \
            --timeout 180
          python3 tests/nnue_v3_modes.py \
            --engine src/atomic-stockfish \
            --v3-net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            --v3-sha256 "$ATOMIC_SYNTHETIC_V3_NNUE_SHA256" \
            --v2-net "$RUNNER_TEMP/atomic-v2.nnue" \
            --timeout 180
      - name: AtomicNNUEV3 AVX2 wire permutation gate
        if: matrix.arch == 'x86-64-avx2'
        run: |
          make -C src -j2 ARCH=${{ matrix.arch }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-wire-tests
          make -C src -j2 ARCH=${{ matrix.arch }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-scalar-tests
          make -C src -j2 ARCH=${{ matrix.arch }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-incremental-tests
          make -C src -j2 ARCH=${{ matrix.arch }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-incremental-stress-tests

  nnue-v3-simd:
    name: AtomicNNUEV3 full-refresh SIMD ${{ matrix.compiler }} ${{ matrix.isa }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - isa: scalar
            arch: general-64
            compiler: GCC
            comp: gcc
            cxx: g++
          - isa: sse41
            arch: x86-64-sse41-popcnt
            compiler: GCC
            comp: gcc
            cxx: g++
          - isa: avx2
            arch: x86-64-avx2
            compiler: GCC
            comp: gcc
            cxx: g++
          - isa: avx2
            arch: x86-64-avx2
            compiler: Clang
            comp: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Create authenticated AtomicNNUEV3 fixture
        run: >-
          python3 tests/create_synthetic_atomic_v3_nnue.py
          --output "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
      - name: Build isolated full-refresh SIMD runner
        run: >-
          make -C src -j2 ARCH=${{ matrix.arch }}
          COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }}
          atomic-v3-simd-tests.bin
      - name: Prove exact Python, scalar and requested-ISA identity
        run: >-
          python3 tests/atomic_v3_simd_differential.py
          --runner src/atomic-v3-simd-tests.bin
          --net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          --require-isa ${{ matrix.isa }}
          --timeout 300
      - name: Verify compiled SIMD kernel symbols and widening instructions
        run: |
          binary=src/atomic-v3-simd-tests.bin
          if [ "${{ matrix.isa }}" = scalar ]; then
            if objdump -t "$binary" | grep -F 'atomic_v3_add_i' >/dev/null; then
              echo "portable scalar build unexpectedly contains an x86 SIMD kernel" >&2
              exit 1
            fi
            exit 0
          fi

          kernels=(
            atomic_v3_add_i16_sse41_kernel
            atomic_v3_add_i8_sse41_kernel
          )
          if [ "${{ matrix.isa }}" = avx2 ]; then
            kernels+=(
              atomic_v3_add_i16_avx2_kernel
              atomic_v3_add_i8_avx2_kernel
            )
          fi
          for symbol in "${kernels[@]}"; do
            assembly="$RUNNER_TEMP/${symbol}.asm"
            objdump -d --disassemble="$symbol" "$binary" > "$assembly"
            grep -F "<$symbol>:" "$assembly"
          done

          if [ "${{ matrix.isa }}" = sse41 ]; then
            grep -E '[[:space:]]pmovsxwd[[:space:]]' \
              "$RUNNER_TEMP/atomic_v3_add_i16_sse41_kernel.asm"
            grep -E '[[:space:]]pmovsxbd[[:space:]]' \
              "$RUNNER_TEMP/atomic_v3_add_i8_sse41_kernel.asm"
          else
            grep -E '[[:space:]]vpmovsxwd[[:space:]]' \
              "$RUNNER_TEMP/atomic_v3_add_i16_avx2_kernel.asm"
            grep -E '[[:space:]]vpmovsxbd[[:space:]]' \
              "$RUNNER_TEMP/atomic_v3_add_i8_avx2_kernel.asm"
          fi

  nnue-v3-incremental-simd:
    name: AtomicNNUEV3 incremental SIMD ${{ matrix.compiler }} ${{ matrix.isa }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - isa: scalar
            arch: general-64
            compiler: GCC
            comp: gcc
            cxx: g++
          - isa: sse41
            arch: x86-64-sse41-popcnt
            compiler: GCC
            comp: gcc
            cxx: g++
          - isa: avx2
            arch: x86-64-avx2
            compiler: GCC
            comp: gcc
            cxx: g++
          - isa: avx2
            arch: x86-64-avx2
            compiler: Clang
            comp: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Create authenticated AtomicNNUEV3 fixture
        run: >-
          python3 tests/create_synthetic_atomic_v3_nnue.py
          --output "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
      - name: Build isolated incremental SIMD runners
        run: |
          make -C src -j2 ARCH=${{ matrix.arch }} \
            COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} \
            atomic-v3-incremental-simd-kernel-tests.bin \
            atomic-v3-incremental-tests.bin \
            atomic-v3-incremental-stress-tests.bin
      - name: Prove exact incremental kernel identity without fallback
        run: >-
          python3 tests/atomic_v3_incremental_simd_kernel.py
          --runner src/atomic-v3-incremental-simd-kernel-tests.bin
          --require-isa ${{ matrix.isa }}
      - name: Prove exact 39-event incremental differential without fallback
        run: >-
          python3 tests/atomic_v3_incremental_differential.py
          --oracle src/atomic-v3-incremental-tests.bin
          --fixture "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          --require-isa ${{ matrix.isa }}
      - name: Prove exact incremental stress smoke without fallback
        run: >-
          python3 tests/atomic_v3_incremental_stress.py
          --binary src/atomic-v3-incremental-stress-tests.bin
          --net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          --mode smoke
          --require-isa ${{ matrix.isa }}
      - name: Verify compiled incremental SIMD symbols and widening instructions
        run: |
          binary=src/atomic-v3-incremental-simd-kernel-tests.bin
          symbol_pattern='atomic_v3_(add|sub)_i16_i64_(sse41|avx2)_kernel'
          if [ "${{ matrix.isa }}" = scalar ]; then
            if objdump -t "$binary" | grep -E "$symbol_pattern" >/dev/null; then
              echo "portable scalar build unexpectedly contains an x86 incremental SIMD kernel" >&2
              exit 1
            fi
            exit 0
          fi

          suffix=sse41
          prefix=
          if [ "${{ matrix.isa }}" = avx2 ]; then
            suffix=avx2
            prefix=v
          fi
          for operation in add sub; do
            symbol="atomic_v3_${operation}_i16_i64_${suffix}_kernel"
            assembly="$RUNNER_TEMP/${symbol}.asm"
            objdump -d --disassemble="$symbol" "$binary" > "$assembly"
            grep -F "<$symbol>:" "$assembly"
            grep -E "[[:space:]]${prefix}pmovsxwd[[:space:]]" "$assembly"
            grep -E "[[:space:]]${prefix}pmovsxdq[[:space:]]" "$assembly"
            grep -E "[[:space:]]${prefix}p${operation}q[[:space:]]" "$assembly"
          done

  nnue-v3-wire-policies:
    name: AtomicNNUEV3 wire policy ${{ matrix.policy }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        policy: [identity, avx2-lasx, avx512]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Forced wire layouts with real AVX2 selftests and differentials
        run: |
          make -C src -j2 ARCH=x86-64-avx2 \
            ATOMIC_V3_WIRE_TEST_POLICY=${{ matrix.policy }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-wire-tests
          make -C src -j2 ARCH=x86-64-avx2 \
            ATOMIC_V3_WIRE_TEST_POLICY=${{ matrix.policy }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-scalar-tests
          make -C src -j2 ARCH=x86-64-avx2 \
            ATOMIC_V3_WIRE_TEST_POLICY=${{ matrix.policy }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            ATOMIC_V3_INCREMENTAL_SIMD_REQUIRED_ISA=avx2 \
            atomic-v3-incremental-simd-tests
          make -C src -j2 ARCH=x86-64-avx2 \
            ATOMIC_V3_WIRE_TEST_POLICY=${{ matrix.policy }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            ATOMIC_V3_INCREMENTAL_SIMD_REQUIRED_ISA=avx2 \
            atomic-v3-incremental-simd-stress-tests
          make -C src -j2 ARCH=x86-64-avx2 \
            ATOMIC_V3_WIRE_TEST_POLICY=${{ matrix.policy }} \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            ATOMIC_V3_SIMD_REQUIRED_ISA=avx2 \
            atomic-v3-simd-tests

  nnue-v3-incremental-stress:
    name: AtomicNNUEV3 incremental stress ${{ matrix.compiler }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            comp: gcc
            cxx: g++
          - compiler: Clang
            comp: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Create authenticated AtomicNNUEV3 fixture
        run: >-
          python3 tests/create_synthetic_atomic_v3_nnue.py
          --output "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
      - name: Build isolated incremental stress runner
        working-directory: src
        run: >-
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }}
          atomic-v3-incremental-stress-tests.bin
      - name: Reject unauthenticated fixtures and explicit zero options
        run: |
          head -c 1024 "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" > "$RUNNER_TEMP/atomic-v3-truncated.nnue"
          if src/atomic-v3-incremental-stress-tests.bin \
            --net "$RUNNER_TEMP/atomic-v3-truncated.nnue" \
            --require-isa scalar > rejected.txt 2>&1; then
            echo "truncated fixture was accepted" >&2
            exit 1
          fi
          grep -F "fixture size mismatch" rejected.txt
          fixture="$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          flip_first_byte() {
            python3 - "$fixture" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          with path.open("r+b") as stream:
              first = stream.read(1)
              if len(first) != 1:
                  raise SystemExit("fixture is empty")
              stream.seek(0)
              stream.write(bytes((first[0] ^ 1,)))
          PY
          }
          flip_first_byte
          trap flip_first_byte EXIT
          if src/atomic-v3-incremental-stress-tests.bin \
            --net "$fixture" --require-isa scalar > rejected.txt 2>&1; then
            echo "corrupted fixture was accepted" >&2
            exit 1
          fi
          grep -F "fixture SHA-256 mismatch" rejected.txt
          flip_first_byte
          trap - EXIT
          for option in --operations --full-refresh-interval --threads; do
            if src/atomic-v3-incremental-stress-tests.bin \
              --net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
              --require-isa scalar "$option" 0 > rejected.txt 2>&1; then
              echo "explicit zero was accepted for $option" >&2
              exit 1
            fi
          done
          rm -f rejected.txt
      - name: Run frozen smoke profile with two scheduling workers
        run: >-
          python3 tests/atomic_v3_incremental_stress.py
          --binary src/atomic-v3-incremental-stress-tests.bin
          --net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          --mode smoke
          --require-isa scalar
          --threads 2
      - name: Run frozen release stress profile
        run: >-
          python3 tests/atomic_v3_incremental_stress.py
          --binary src/atomic-v3-incremental-stress-tests.bin
          --net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          --mode release
          --require-isa scalar

  debug:
    name: Debug and assertions
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build debug engine
        working-directory: src
        run: make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ debug=yes optimize=no build
      - name: Create authenticated Legacy V1 and AtomicNNUEV2 fixtures
        run: |
          python3 tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          python3 tests/create_synthetic_atomic_v2_nnue.py --output "$RUNNER_TEMP/atomic-v2.nnue"
      - name: Debug units and perft
        run: |
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-unit-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-api-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-nnue-incremental-tests.bin
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v2-backend-core-tests.bin
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v2-incremental-tests.bin
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v3-hm-oracle-tests
          python3 tests/atomic_v3_hm_differential.py --oracle src/atomic-v3-hm-oracle-tests.bin
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v3-capture-pair-tests
          python3 tests/atomic_v3_capture_pair_differential.py --oracle src/atomic-v3-capture-pair-tests.bin
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v3-king-blast-ep-tests
          python3 tests/atomic_v3_king_blast_ep_differential.py --oracle src/atomic-v3-king-blast-ep-tests.bin
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v3-blast-ring-tests
          python3 tests/atomic_v3_blast_ring_differential.py --oracle src/atomic-v3-blast-ring-tests.bin
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v3-full-refresh-tests
          python3 tests/atomic_v3_full_refresh_differential.py --oracle src/atomic-v3-full-refresh-tests.bin
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v3-numeric-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-wire-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-scalar-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-incremental-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-incremental-stress-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            ATOMIC_V3_SIMD_REQUIRED_ISA=scalar \
            atomic-v3-simd-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-syzygy-driver
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no legacy-atomic-v1-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-sink-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-manifest-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-manifest-reader-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-reader-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v3-trajectory-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-v3-private-staging-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no data-tools-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no data-generator
          ATOMIC_PERFT_NET="$RUNNER_TEMP/atomic-v2.nnue" bash tests/perft.sh src/atomic-stockfish
          python3 tests/atomic_search.py --candidate src/atomic-stockfish --use-nnue false
      - name: Functional debug data-generator smoke (Threads=2)
        run: |
          src/atomic-v2-backend-core-tests.bin "$RUNNER_TEMP/atomic-v2.nnue"
          src/atomic-v2-incremental-tests.bin --net "$RUNNER_TEMP/atomic-v2.nnue" --operations 4096 --full-refresh-interval 1
          python3 tests/data_generator.py --smoke-only \
            --generator src/atomic-stockfish-data-generator \
            --normal-engine src/atomic-stockfish \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256"
          python3 tests/atomic_v3_trajectory_producer.py \
            --generator src/atomic-stockfish-data-generator \
            --net "$RUNNER_TEMP/atomic-zero.nnue"

  debug-clang:
    name: Clang debug/assert smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
