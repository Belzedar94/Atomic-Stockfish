          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-bin-v2-reader-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-trajectory-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-private-staging-tests.bin
      - name: Run Atomic BIN V2 tests under Valgrind
        run: |
          for test in atomic-bin-v2-tests atomic-bin-v2-sink-tests atomic-bin-v2-manifest-tests atomic-bin-v2-manifest-reader-tests atomic-bin-v2-reader-tests atomic-v3-trajectory-tests atomic-v3-private-staging-tests; do
