          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-bin-v2-sink-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-bin-v2-manifest-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
