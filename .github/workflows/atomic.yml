          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v2-backend-core-tests.exe
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v2-incremental-tests.exe
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v3-hm-oracle-tests
          python tests/atomic_v3_hm_differential.py --oracle src/atomic-v3-hm-oracle-tests.exe
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v3-capture-pair-tests
          python tests/atomic_v3_capture_pair_differential.py --oracle src/atomic-v3-capture-pair-tests.exe
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v3-king-blast-ep-tests
          python tests/atomic_v3_king_blast_ep_differential.py --oracle src/atomic-v3-king-blast-ep-tests.exe
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v3-blast-ring-tests
          python tests/atomic_v3_blast_ring_differential.py --oracle src/atomic-v3-blast-ring-tests.exe
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v3-full-refresh-tests
          python tests/atomic_v3_full_refresh_differential.py --oracle src/atomic-v3-full-refresh-tests.exe
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v3-numeric-tests
          python tests/create_synthetic_atomic_v3_nnue.py --output "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v3-wire-tests.exe
          src/atomic-v3-wire-tests.exe selftest "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          python tests/atomic_v3_wire_differential.py \
            --oracle src/atomic-v3-wire-tests.exe \
            --fixture "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          make -C src -j2 ARCH=x86-64 COMP=mingw \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-scalar-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-incremental-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            atomic-v3-incremental-stress-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw \
            ATOMIC_V3_INCREMENTAL_SIMD_REQUIRED_ISA=scalar \
            atomic-v3-incremental-simd-kernel-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            ATOMIC_V3_INCREMENTAL_SIMD_REQUIRED_ISA=scalar \
            atomic-v3-incremental-simd-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            ATOMIC_V3_INCREMENTAL_SIMD_REQUIRED_ISA=scalar \
            atomic-v3-incremental-simd-stress-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw \
            ATOMIC_NNUE_V3_TEST_NET="$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            ATOMIC_V3_SIMD_REQUIRED_ISA=scalar \
            atomic-v3-simd-tests
          python tests/create_synthetic_atomic_v2_nnue.py --output "$RUNNER_TEMP/atomic-v2.nnue"
          python tests/nnue_v3_modes.py \
            --engine src/atomic-stockfish.exe \
            --v3-net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            --v3-sha256 "$ATOMIC_SYNTHETIC_V3_NNUE_SHA256" \
            --v2-net "$RUNNER_TEMP/atomic-v2.nnue" \
            --timeout 180
          make -C src -j2 ARCH=x86-64 COMP=mingw data-generator
          make -C src -j2 ARCH=x86-64 COMP=mingw legacy-atomic-v1-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-sink-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-manifest-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-manifest-reader-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-reader-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v3-trajectory-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-v3-private-staging-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw data-tools-tests
          printf 'atomic_data_schema\natomic_data_schemas\nquit\n' | src/atomic-stockfish-data-generator.exe > schema.txt
          grep -F '"schema_sha256":"acca0f551f1c012c31a6c727dedccaebb7b5ebbc46810edb87e31bb208d5abe1"' schema.txt
          grep -F '"schema_sha256":"0352b036f2a140c609e3eb9c9d635dc553e8d77253d8faa92437390f5cf93cb6"' schema.txt
          rm -f schema.txt
      - name: Functional Windows data-generator smoke (Threads=2)
        run: |
          python tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          src/atomic-v2-backend-core-tests.exe "$RUNNER_TEMP/atomic-v2.nnue"
          src/atomic-v2-incremental-tests.exe --net "$RUNNER_TEMP/atomic-v2.nnue" --operations 4096 --full-refresh-interval 1
          python tests/data_generator.py --smoke-only \
            --generator src/atomic-stockfish-data-generator.exe \
            --normal-engine src/atomic-stockfish.exe \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256"
          python tests/atomic_v3_trajectory_producer.py \
            --generator src/atomic-stockfish-data-generator.exe \
            --net "$RUNNER_TEMP/atomic-zero.nnue"
      - name: MinGW debug/assert build and protocol smoke
        run: |
          make -C src ARCH=x86-64 COMP=mingw clean
          make -C src -j2 ARCH=x86-64 COMP=mingw debug=yes optimize=no build
          make -C src -j2 ARCH=x86-64 COMP=mingw debug=yes optimize=no atomic-unit-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw debug=yes optimize=no atomic-api-tests
          python tests/release_protocol_smoke.py --engine src/atomic-stockfish.exe

  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan and UBSan
            sanitizer: address,undefined
            mode: memory
          - name: TSan
            sanitizer: thread
            mode: thread
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Lower ASLR entropy for TSan
        if: matrix.mode == 'thread'
        run: sudo sysctl -w vm.mmap_rnd_bits=28
      - name: Build instrumented engine
        working-directory: src
        env:
          CXXFLAGS: -O1
        run: |
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no build
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-nnue-incremental-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v2-backend-core-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v2-incremental-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-hm-oracle-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-capture-pair-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-king-blast-ep-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-blast-ring-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-full-refresh-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-numeric-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-wire-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-scalar-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-incremental-simd-kernel-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-incremental-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-incremental-stress-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-simd-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-trajectory-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-v3-private-staging-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no data-generator
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no data-tools
      - name: Create authenticated Legacy V1 and AtomicNNUEV2 fixtures
        run: |
          python3 tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          python3 tests/create_synthetic_atomic_v2_nnue.py --output "$RUNNER_TEMP/atomic-v2.nnue"
      - name: Create authenticated AtomicNNUEV3 wire fixture
        run: >-
          python3 tests/create_synthetic_atomic_v3_nnue.py
          --output "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
      - name: Instrumented AtomicNNUEV3 numeric, wire, scalar and incremental backends
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1:log_path=tsan-v3-wire
        run: |
          stress_operations=512
          if [ "${{ matrix.mode }}" = memory ]; then stress_operations=4096; fi
          set +e
          src/atomic-v3-numeric-tests.bin && \
          src/atomic-v3-wire-tests.bin inspect "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" && \
          src/atomic-v3-scalar-tests.bin "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" && \
          python3 tests/atomic_v3_incremental_simd_kernel.py \
            --runner src/atomic-v3-incremental-simd-kernel-tests.bin \
            --require-isa sse41 && \
          python3 tests/atomic_v3_simd_differential.py \
            --runner src/atomic-v3-simd-tests.bin \
            --net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            --require-isa sse41 \
            --timeout 300 && \
          python3 tests/atomic_v3_incremental_differential.py \
            --oracle src/atomic-v3-incremental-tests.bin \
            --fixture "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            --require-isa sse41 && \
          python3 tests/atomic_v3_incremental_stress.py \
            --binary src/atomic-v3-incremental-stress-tests.bin \
            --net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            --mode smoke \
            --require-isa sse41 \
            --operations "$stress_operations" \
            --full-refresh-interval 1 \
            --threads 4
          status=$?
          if compgen -G 'tsan-v3-wire.*' > /dev/null; then
            cat tsan-v3-wire.*
          fi
          exit "$status"
      - name: Memory-sanitized units
        if: matrix.mode == 'memory'
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-unit-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-api-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no legacy-atomic-v1-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-sink-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-manifest-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-manifest-reader-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-reader-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no data-tools-tests
          src/atomic-v3-wire-tests.bin selftest "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          python3 tests/atomic_v3_wire_differential.py \
            --oracle src/atomic-v3-wire-tests.bin \
            --fixture "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          python3 tests/atomic_v3_scalar_differential.py \
            --oracle src/atomic-v3-scalar-tests.bin \
            --fixture "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          ATOMIC_PERFT_NET="$RUNNER_TEMP/atomic-v2.nnue" bash tests/perft.sh src/atomic-stockfish
      - name: Instrumented AtomicNNUEV2 core, incremental, reload and threading
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1:log_path=tsan-v2
        run: |
          operations=1024
          if [ "${{ matrix.mode }}" = memory ]; then operations=4096; fi
          set +e
          src/atomic-v2-backend-core-tests.bin "$RUNNER_TEMP/atomic-v2.nnue" && \
          src/atomic-v2-incremental-tests.bin \
            --net "$RUNNER_TEMP/atomic-v2.nnue" \
            --operations "$operations" \
            --full-refresh-interval 1 && \
          src/atomic-v3-hm-oracle-tests.bin && \
          src/atomic-v3-capture-pair-tests.bin && \
          src/atomic-v3-king-blast-ep-tests.bin && \
          src/atomic-v3-blast-ring-tests.bin && \
          src/atomic-v3-full-refresh-tests.bin && \
          python3 tests/nnue_v2_modes.py \
            --engine src/atomic-stockfish \
            --legacy-net "$RUNNER_TEMP/atomic-zero.nnue" \
            --legacy-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256" \
            --v2-net "$RUNNER_TEMP/atomic-v2.nnue" \
            --timeout 180
          status=$?
          if compgen -G 'tsan-v2.*' > /dev/null; then
            cat tsan-v2.*
          fi
          exit "$status"
      - name: Instrumented data-generator smoke (Threads=2)
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1:log_path=tsan-generator
        run: |
          set +e
          python3 tests/data_generator.py --smoke-only \
            --generator src/atomic-stockfish-data-generator \
            --normal-engine src/atomic-stockfish \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256" && \
          src/atomic-v3-trajectory-tests.bin && \
          src/atomic-v3-private-staging-tests.bin && \
          python3 tests/atomic_v3_trajectory_producer.py \
            --generator src/atomic-stockfish-data-generator \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --timeout 300
          status=$?
          if compgen -G 'tsan-generator.*' > /dev/null; then
            cat tsan-generator.*
          fi
          exit "$status"
      - name: Instrumented XBoard workload
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1:log_path=tsan-report
        run: |
          set +e
          python3 tests/xboard_protocol.py \
            --candidate src/atomic-stockfish \
            --eval-file "$RUNNER_TEMP/atomic-v2.nnue" \
            --timeout 180
          status=$?
          if compgen -G 'tsan-report.*' > /dev/null; then
            cat tsan-report.*
          fi
          exit "$status"

  nnue-v2-v3-valgrind:
    name: AtomicNNUE V2 + V3 Valgrind
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends valgrind
      - name: Build AtomicNNUEV2 and AtomicNNUEV3 isolated tests
        working-directory: src
        run: |
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v2-backend-core-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v2-incremental-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-hm-oracle-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-capture-pair-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-king-blast-ep-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-blast-ring-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-numeric-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-wire-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-scalar-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-incremental-simd-kernel-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-incremental-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-v3-simd-tests.bin
      - name: Run AtomicNNUEV2 and AtomicNNUEV3 isolated tests under Valgrind
        run: |
          python3 tests/create_synthetic_atomic_v2_nnue.py \
            --output "$RUNNER_TEMP/atomic-v2.nnue"
          python3 tests/create_synthetic_atomic_v3_nnue.py \
            --output "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          valgrind \
            --error-exitcode=99 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v2-backend-core-tests.bin \
            "$RUNNER_TEMP/atomic-v2.nnue"
          valgrind \
            --error-exitcode=99 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v2-incremental-tests.bin \
            --net "$RUNNER_TEMP/atomic-v2.nnue" \
            --operations 256 \
            --full-refresh-interval 1
          valgrind \
            --error-exitcode=99 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v3-hm-oracle-tests.bin
          valgrind \
            --error-exitcode=99 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v3-capture-pair-tests.bin
          valgrind \
            --error-exitcode=99 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v3-king-blast-ep-tests.bin
          valgrind \
            --error-exitcode=99 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v3-blast-ring-tests.bin
          valgrind \
            --error-exitcode=99 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v3-numeric-tests.bin
          valgrind \
            --error-exitcode=99 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v3-wire-tests.bin inspect \
            "$RUNNER_TEMP/atomic-v3-wire-v1.nnue"
          valgrind \
            --error-exitcode=99 \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v3-scalar-tests.bin \
            "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            --snapshot white d6 "7k/3b4/8/2RPp3/8/8/8/K7"
          cat > "$RUNNER_TEMP/atomic-v3-simd-one-case.in" <<'EOF'
          record=simd_input
          case=0
          chess960=0
          fen=7k/8/2N1b3/2ppP3/8/8/8/K7 w - d6 0 2
          end_input=0
          batch_cases=1
          EOF
          valgrind \
            --error-exitcode=99 \
            --quiet \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            src/atomic-v3-simd-tests.bin \
            --net "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            --require-isa scalar \
            --batch \
            < "$RUNNER_TEMP/atomic-v3-simd-one-case.in" \
            > "$RUNNER_TEMP/atomic-v3-simd-one-case.out"
          grep -E \
            '^AtomicNNUEV3 SIMD gate passed: requested=scalar executed=scalar cases=1 comparisons=1 errors=0 .*fallback_calls=0 fingerprint=0x[0-9A-F]{16}$' \
            "$RUNNER_TEMP/atomic-v3-simd-one-case.out"
          cat > "$RUNNER_TEMP/atomic-v3-incremental-simd-kernel-valgrind" <<'EOF'
          #!/usr/bin/env bash
          exec valgrind \
            --error-exitcode=99 \
            --quiet \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            "$GITHUB_WORKSPACE/src/atomic-v3-incremental-simd-kernel-tests.bin" "$@"
          EOF
          chmod +x "$RUNNER_TEMP/atomic-v3-incremental-simd-kernel-valgrind"
          python3 tests/atomic_v3_incremental_simd_kernel.py \
            --runner "$RUNNER_TEMP/atomic-v3-incremental-simd-kernel-valgrind" \
            --require-isa scalar \
            --timeout 900
          cat > "$RUNNER_TEMP/atomic-v3-incremental-valgrind" <<'EOF'
          #!/usr/bin/env bash
          exec valgrind \
            --error-exitcode=99 \
            --quiet \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --num-callers=30 \
            "$GITHUB_WORKSPACE/src/atomic-v3-incremental-tests.bin" "$@"
          EOF
          chmod +x "$RUNNER_TEMP/atomic-v3-incremental-valgrind"
          python3 tests/atomic_v3_incremental_differential.py \
            --oracle "$RUNNER_TEMP/atomic-v3-incremental-valgrind" \
            --fixture "$RUNNER_TEMP/atomic-v3-wire-v1.nnue" \
            --require-isa scalar

