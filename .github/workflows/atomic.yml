  legacy-pipeline:
    name: Pinned Legacy Atomic V1 pipeline
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out Atomic-Stockfish
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10.18'
      - name: Resolve immutable sibling pins
        id: pipeline_lock
        run: >-
          python tests/legacy_pipeline_lock.py
          github-outputs --output "$GITHUB_OUTPUT"
          --allow-unresolved-hashes
      - name: Check out variant-nnue-tools at the locked commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.pipeline_lock.outputs.tools_repository }}
          ref: ${{ steps.pipeline_lock.outputs.tools_commit }}
          path: .pipeline/tools
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive
      - name: Fetch the tools engine authentication ref
        working-directory: .pipeline/tools/engine/Atomic-Stockfish
        run: |
          if [ "$(git rev-parse --is-shallow-repository)" = true ]; then
            git fetch --no-tags --unshallow origin
          fi
          git fetch --no-tags origin +main:refs/remotes/origin/main
      - name: Check out variant-nnue-pytorch at the locked commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.pipeline_lock.outputs.trainer_repository }}
          ref: ${{ steps.pipeline_lock.outputs.trainer_commit }}
          path: .pipeline/trainer
          persist-credentials: false
          submodules: recursive
      - name: Fetch the trainer engine authentication ref
        working-directory: .pipeline/trainer/external/Atomic-Stockfish
        run: |
          if [ "$(git rev-parse --is-shallow-repository)" = true ]; then
            git fetch --no-tags --unshallow origin
          fi
          git fetch --no-tags origin +main:refs/remotes/origin/main
      - name: Install pinned CPU trainer dependencies
        run: |
          echo "1298F53B58B86B543F79AF4BB262838FE03B82F70D7892C7A5DDADBC0B008224  tests/pip-bootstrap-requirements.txt" | sha256sum --check --strict
          python -m pip install --disable-pip-version-check --require-hashes -r tests/pip-bootstrap-requirements.txt
          echo "20E818B72736FC95CEDF82FDE26413B8ABCC036809BAD72E25AAD93D327FCDA7  tests/legacy_pipeline-ci-requirements.txt" | sha256sum --check --strict
          python -m pip install --disable-pip-version-check --require-hashes -r tests/legacy_pipeline-ci-requirements.txt
      - name: Record pipeline toolchain provenance
        run: |
          python --version
          python -m pip --version
          python -m pip freeze --all
          cmake --version
          g++ --version
          make --version
      - name: Clean-build and test variant-nnue-tools
        run: |
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-tools-linux-v2 \
            --repository-root .pipeline/tools \
            --output "$RUNNER_TEMP/tools-build.json"
          make -C .pipeline/tools pin-tests verify-delegated-tsan tools-unit
          make -C .pipeline/tools -j2 ARCH=x86-64 COMP=gcc v2-data-tools
          python .pipeline/tools/tests/tools_integration.py --engine .pipeline/tools/src/atomic-data-tools
      - name: Clean-build trainer native loader
        run: |
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-trainer-linux-v1 \
            --repository-root .pipeline/trainer \
            --output "$RUNNER_TEMP/trainer-build.json"
          ctest --test-dir .pipeline/trainer/build/pipeline-manifest-release -C Release --output-on-failure
      - name: Test trainer CPU surface
        working-directory: .pipeline/trainer
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python -m pytest -q -p no:cacheprovider
      - name: Clean-build and test Atomic-Stockfish
        run: |
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-atomic-linux-v2 \
            --repository-root . \
            --output "$RUNNER_TEMP/atomic-build.json"
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-atomic-data-generator-linux-v2 \
            --repository-root . \
            --output "$RUNNER_TEMP/atomic-data-generator-build.json"
          make -C src -j2 ARCH=x86-64 atomic-unit-tests
          make -C src -j2 ARCH=x86-64 atomic-api-tests
          make -C src -j2 ARCH=x86-64 legacy-atomic-v1-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-sink-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-manifest-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-manifest-reader-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-reader-tests
          make -C src -j2 ARCH=x86-64 data-tools
          bash tests/perft.sh src/atomic-stockfish
          python tests/atomic_search.py --candidate src/atomic-stockfish --use-nnue false
      - name: Enforce locked clean checkouts
        run: >-
          python tests/legacy_pipeline_lock.py verify-checkouts
          --tools-root .pipeline/tools
          --trainer-root .pipeline/trainer
          --atomic-root .
          --tools-engine .pipeline/tools/src/atomic-data-tools
          --engine src/atomic-stockfish
          --atomic-commit "$(git rev-parse HEAD)"
          --allow-unresolved-hashes
      - name: Measure unresolved synthetic pipeline fixture
        if: steps.pipeline_lock.outputs.synthetic_hashes_resolved == 'false'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          python tests/legacy_pipeline_e2e.py \
            --profile synthetic-ci \
            --tools-engine .pipeline/tools/src/atomic-data-tools \
            --trainer-root .pipeline/trainer \
            --engine src/atomic-stockfish-pipeline \
            --atomic-data-generator src/atomic-stockfish-data-generator-pipeline \
            --tools-build-manifest "$RUNNER_TEMP/tools-build.json" \
            --trainer-build-manifest "$RUNNER_TEMP/trainer-build.json" \
            --atomic-build-manifest "$RUNNER_TEMP/atomic-build.json" \
            --atomic-data-generator-build-manifest "$RUNNER_TEMP/atomic-data-generator-build.json" \
            --atomic-root . \
            --atomic-commit "$(git rev-parse HEAD)" \
            --measure-synthetic-fixture
          echo "::error title=Synthetic fixture lock update required::Copy the measured source_sha256 and Atomic-owned data_sha256 into tests/legacy_pipeline.lock.json, set hashes_resolved=true, and remove its placeholder."
          exit 1
      - name: Synthetic Legacy Atomic V1 E2E
        if: steps.pipeline_lock.outputs.synthetic_hashes_resolved == 'true'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: >-
          python tests/legacy_pipeline_e2e.py
          --profile synthetic-ci
          --tools-engine .pipeline/tools/src/atomic-data-tools
          --trainer-root .pipeline/trainer
          --engine src/atomic-stockfish-pipeline
          --atomic-data-generator src/atomic-stockfish-data-generator-pipeline
          --tools-build-manifest "$RUNNER_TEMP/tools-build.json"
          --trainer-build-manifest "$RUNNER_TEMP/trainer-build.json"
          --atomic-build-manifest "$RUNNER_TEMP/atomic-build.json"
          --atomic-data-generator-build-manifest "$RUNNER_TEMP/atomic-data-generator-build.json"
          --atomic-root .
          --atomic-commit "$(git rev-parse HEAD)"
      - name: Synthetic Atomic BIN V2 generate-train-load E2E
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          set -euo pipefail
          SOURCE_NET="$RUNNER_TEMP/atomic-h7-zero.nnue"
          OUTPUT_DIR="$RUNNER_TEMP/atomic-h7-v2-e2e"
          PYTHON_BIN="$(python -c 'import pathlib,sys; print(pathlib.Path(sys.executable).resolve())')"
          test ! -e "$SOURCE_NET"
          test ! -e "$OUTPUT_DIR"
          python -B tests/create_synthetic_zero_nnue.py --output "$SOURCE_NET"
          echo "9CF054CA00B82AB53A34473DE52D1104AEDDAA19B2E7B24091B5E613AF485985  $SOURCE_NET" | sha256sum --check --strict

          sha256_file() {
            sha256sum "$1" | awk '{print tolower($1)}'
          }

          python -B tests/atomic_bin_v2_pipeline_e2e.py \
            --profile synthetic-ci \
            --atomic-root . \
            --atomic-commit "$(git rev-parse HEAD)" \
            --atomic-ref "$(git rev-parse HEAD)" \
            --tools-root .pipeline/tools \
            --tools-commit 450049ee7a0ece32694b11f6c55deb7df1d42a84 \
            --tools-ref 450049ee7a0ece32694b11f6c55deb7df1d42a84 \
            --trainer-root .pipeline/trainer \
            --trainer-commit 3a19c16fc3d477b1ee7602ccc6510736bc7604cc \
            --trainer-ref 3a19c16fc3d477b1ee7602ccc6510736bc7604cc \
            --tools-engine-commit 420c9f35266fbdc2167dc5b9d8d20d90281c60c9 \
            --trainer-engine-commit 420c9f35266fbdc2167dc5b9d8d20d90281c60c9 \
            --engine src/atomic-stockfish-pipeline \
            --engine-sha256 "$(sha256_file src/atomic-stockfish-pipeline)" \
            --data-generator src/atomic-stockfish-data-generator-pipeline \
            --data-generator-sha256 "$(sha256_file src/atomic-stockfish-data-generator-pipeline)" \
            --data-tools src/atomic-stockfish-data-tools \
            --data-tools-sha256 "$(sha256_file src/atomic-stockfish-data-tools)" \
            --tools-wrapper .pipeline/tools/script/atomic_bin_v2_tools.py \
            --wrapper-data-tools .pipeline/tools/engine/Atomic-Stockfish/src/atomic-stockfish-data-tools \
            --wrapper-data-tools-sha256 "$(sha256_file .pipeline/tools/engine/Atomic-Stockfish/src/atomic-stockfish-data-tools)" \
            --trainer-loader .pipeline/trainer/libtraining_data_loader.so \
            --trainer-loader-sha256 "$(sha256_file .pipeline/trainer/libtraining_data_loader.so)" \
            --train-script .pipeline/trainer/train.py \
            --serialize-script .pipeline/trainer/serialize.py \
            --python "$PYTHON_BIN" \
            --python-sha256 "$(sha256_file "$PYTHON_BIN")" \
            --source-net "$SOURCE_NET" \
            --source-net-sha256 9cf054ca00b82ab53a34473de52d1104aeddaa19b2e7b24091b5e613af485985 \
            --output-dir "$OUTPUT_DIR" \
            --train-seed 2026071301 \
            --validation-seed 2026071302
      - name: Preserve sanitized Atomic BIN V2 evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: atomic-bin-v2-e2e-evidence
          path: ${{ runner.temp }}/atomic-h7-v2-e2e
          if-no-files-found: warn
          retention-days: 14
