          python3 tests/release_protocol_smoke.py --engine src/atomic-stockfish

  data-generator-windows:
    name: Data generator Windows MinGW
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
