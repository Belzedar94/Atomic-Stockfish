          tests/python/test_atomic_v3_blast_ring_oracle.py
          tests/python/test_atomic_v3_full_refresh_oracle.py
          tests/python/test_atomic_v3_wire_reference.py
          tests/python/test_atomic_v3_scalar_oracle.py
          tests/python/test_atomic_v3_incremental_oracle.py
          tests/python/test_atomic_v3_incremental_simd_kernel_wrapper.py
          tests/python/test_atomic_v3_incremental_simd_benchmark.py
          tests/python/test_atomic_v3_incremental_stress_wrapper.py
          tests/python/test_atomic_v3_simd_wrapper.py
          tests/python/test_atomic_v3_simd_benchmark.py
