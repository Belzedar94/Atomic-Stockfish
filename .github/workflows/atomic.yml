name: Atomic CI

on:
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: atomic-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ATOMIC_SYNTHETIC_NNUE_SHA256: 9CF054CA00B82AB53A34473DE52D1104AEDDAA19B2E7B24091B5E613AF485985

jobs:
  native:
    name: Native ${{ matrix.compiler }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            comp: gcc
            cxx: g++
          - compiler: Clang
            comp: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build portable x86-64
        working-directory: src
        run: make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} build
      - name: C++ rule and shared-API units
        working-directory: src
        run: |
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-unit-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-api-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-nnue-incremental-tests.bin
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-syzygy-driver
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} legacy-atomic-v1-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-sink-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-manifest-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-manifest-reader-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-bin-v2-reader-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} data-tools-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} data-generator
      - name: Functional data-generator gate (full on GCC, smoke on Clang)
        run: |
          python3 tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          mode=--smoke-only
          if [ "${{ matrix.comp }}" = gcc ]; then mode=; fi
          python3 tests/data_generator.py $mode \
            --generator src/atomic-stockfish-data-generator \
            --normal-engine src/atomic-stockfish \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256"
      - name: Atomic Syzygy source/domain contract
        run: python3 tests/atomic_syzygy.py --contract-only
      - name: Atomic and Atomic960 perft
        run: bash tests/perft.sh src/atomic-stockfish
      - name: Atomic search regressions
        run: python3 tests/atomic_search.py --candidate src/atomic-stockfish --use-nnue false
      - name: XBoard protocol
        run: python3 tests/xboard_protocol.py --candidate src/atomic-stockfish

  debug:
    name: Debug and assertions
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build debug engine
        working-directory: src
        run: make -j2 ARCH=x86-64 debug=yes optimize=no build
      - name: Debug units and perft
        run: |
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-unit-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-api-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-nnue-incremental-tests.bin
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-syzygy-driver
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no legacy-atomic-v1-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-sink-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-manifest-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-manifest-reader-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-bin-v2-reader-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no data-tools-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no data-generator
          bash tests/perft.sh src/atomic-stockfish
          python3 tests/atomic_search.py --candidate src/atomic-stockfish --use-nnue false
      - name: Functional debug data-generator smoke (Threads=2)
        run: |
          python3 tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          python3 tests/data_generator.py --smoke-only \
            --generator src/atomic-stockfish-data-generator \
            --normal-engine src/atomic-stockfish \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256"

  data-generator-windows:
    name: Data generator Windows MinGW
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Set up MinGW
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: mingw64
          path-type: inherit
          install: mingw-w64-x86_64-gcc make
      - name: Build isolated generator and run frozen codec fixture
        run: |
          make -C src -j2 ARCH=x86-64 COMP=mingw build
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-nnue-incremental-tests.exe
          make -C src -j2 ARCH=x86-64 COMP=mingw data-generator
          make -C src -j2 ARCH=x86-64 COMP=mingw legacy-atomic-v1-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-sink-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-manifest-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-manifest-reader-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw atomic-bin-v2-reader-tests
          make -C src -j2 ARCH=x86-64 COMP=mingw data-tools-tests
          printf 'atomic_data_schema\natomic_data_schemas\nquit\n' | src/atomic-stockfish-data-generator.exe > schema.txt
          grep -F '"schema_sha256":"acca0f551f1c012c31a6c727dedccaebb7b5ebbc46810edb87e31bb208d5abe1"' schema.txt
          grep -F '"schema_sha256":"0352b036f2a140c609e3eb9c9d635dc553e8d77253d8faa92437390f5cf93cb6"' schema.txt
          rm -f schema.txt
      - name: Functional Windows data-generator smoke (Threads=2)
        run: |
          python tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          python tests/data_generator.py --smoke-only \
            --generator src/atomic-stockfish-data-generator.exe \
            --normal-engine src/atomic-stockfish.exe \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256"

  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan and UBSan
            sanitizer: address,undefined
            mode: memory
          - name: TSan
            sanitizer: thread
            mode: thread
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Lower ASLR entropy for TSan
        if: matrix.mode == 'thread'
        run: sudo sysctl -w vm.mmap_rnd_bits=28
      - name: Build instrumented engine
        working-directory: src
        env:
          CXXFLAGS: -O1
        run: |
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no build
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-nnue-incremental-tests.bin
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no data-generator
          make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no data-tools
      - name: Memory-sanitized units
        if: matrix.mode == 'memory'
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-unit-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-api-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no legacy-atomic-v1-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-sink-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-manifest-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-manifest-reader-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-bin-v2-reader-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no data-tools-tests
          bash tests/perft.sh src/atomic-stockfish
      - name: Instrumented data-generator smoke (Threads=2)
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1:log_path=tsan-generator
        run: |
          python3 tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          set +e
          python3 tests/data_generator.py --smoke-only \
            --generator src/atomic-stockfish-data-generator \
            --normal-engine src/atomic-stockfish \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256"
          status=$?
          if compgen -G 'tsan-generator.*' > /dev/null; then
            cat tsan-generator.*
          fi
          exit "$status"
      - name: Instrumented XBoard workload
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1:log_path=tsan-report
        run: |
          set +e
          python3 tests/xboard_protocol.py --candidate src/atomic-stockfish
          status=$?
          if compgen -G 'tsan-report.*' > /dev/null; then
            cat tsan-report.*
          fi
          exit "$status"

  atomic-bin-v2-valgrind:
    name: Atomic BIN V2 Valgrind
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends valgrind
      - name: Build isolated Atomic BIN V2 tests
        working-directory: src
        run: |
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-bin-v2-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-bin-v2-sink-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-bin-v2-manifest-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-bin-v2-manifest-reader-tests.bin
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ \
            debug=yes optimize=no atomic-bin-v2-reader-tests.bin
      - name: Run Atomic BIN V2 tests under Valgrind
        run: |
          for test in atomic-bin-v2-tests atomic-bin-v2-sink-tests atomic-bin-v2-manifest-tests atomic-bin-v2-manifest-reader-tests atomic-bin-v2-reader-tests; do
            valgrind \
              --error-exitcode=99 \
              --leak-check=full \
              --show-leak-kinds=all \
              --errors-for-leak-kinds=all \
              --track-origins=yes \
              --num-callers=30 \
              "src/${test}.bin"
          done
      - name: Build optimized real generator
        working-directory: src
        run: |
          make objclean
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ data-generator
      - name: Run a real Atomic BIN V2 generator under Valgrind
        run: |
          python3 tests/create_synthetic_zero_nnue.py --output "$RUNNER_TEMP/atomic-zero.nnue"
          python3 tests/atomic_bin_v2_valgrind.py \
            --generator src/atomic-stockfish-data-generator \
            --net "$RUNNER_TEMP/atomic-zero.nnue" \
            --expected-net-sha256 "$ATOMIC_SYNTHETIC_NNUE_SHA256"

  python:
    name: Python stable ABI (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --disable-pip-version-check -r tests/python-ci-requirements.txt
      - run: python setup.py build_ext --inplace
      - run: python test.py
      - run: python -m pytest -q tests/python/test_pyffish.py
      - run: >-
          python -m pytest -q
          tests/python/test_atomic_los_gate.py
          tests/python/test_atomic_syzygy_uci.py
          tests/python/test_atomic_compiler_preflight.py
          tests/python/test_atomic_training_data_schema.py
          tests/python/test_atomic_bin_v2_schema.py
          tests/python/test_atomic_bin_v2_manifest_schema.py
          tests/python/test_atomic_data_tools_source_lists.py
          tests/python/test_atomic_init_source_lists.py
          tests/python/test_atomic_nnue_differential.py
          tests/python/test_atomic_nnue_incremental_wrapper.py
          tests/python/test_nnue_dispatcher_source.py
          tests/python/test_legacy_pipeline_lock.py
          tests/python/test_legacy_pipeline_build_manifest.py
          tests/python/test_data_generator_build_manifest.py
          tests/python/test_legacy_pipeline_e2e.py
          tests/python/test_atomic_bin_v2_pipeline_e2e.py
      - run: python setup.py sdist --dist-dir dist/sdist
      - run: python tests/python/build_wheel_from_sdist.py dist/sdist dist/wheel
      - run: python tests/python/test_wheel_layout.py dist/wheel

  board-wasm:
    name: CommonJS and ES-module WASM
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build Board WASM
        run: >-
          docker run --rm
          --volume "$PWD:/src"
          --workdir /src/src
          emscripten/emsdk:3.1.46@sha256:2491bc4bf6caf8c41993660822341bc72759cb577363dfe0781f0a2d05f7d357
          make -f Makefile_js all
      - name: Test CommonJS and ES modules
        working-directory: tests/js
        run: npm test

  legacy-pipeline:
    name: Pinned Legacy Atomic V1 pipeline
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out Atomic-Stockfish
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10.18'
      - name: Resolve immutable sibling pins
        id: pipeline_lock
        run: >-
          python tests/legacy_pipeline_lock.py
          github-outputs --output "$GITHUB_OUTPUT"
          --allow-unresolved-hashes
      - name: Check out variant-nnue-tools at the locked commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.pipeline_lock.outputs.tools_repository }}
          ref: ${{ steps.pipeline_lock.outputs.tools_commit }}
          path: .pipeline/tools
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive
      - name: Fetch the tools engine authentication ref
        working-directory: .pipeline/tools/engine/Atomic-Stockfish
        run: |
          if [ "$(git rev-parse --is-shallow-repository)" = true ]; then
            git fetch --no-tags --unshallow origin
          fi
          git fetch --no-tags origin +main:refs/remotes/origin/main
      - name: Check out variant-nnue-pytorch at the locked commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.pipeline_lock.outputs.trainer_repository }}
          ref: ${{ steps.pipeline_lock.outputs.trainer_commit }}
          path: .pipeline/trainer
          persist-credentials: false
      - name: Install pinned CPU trainer dependencies
        run: |
          echo "1298F53B58B86B543F79AF4BB262838FE03B82F70D7892C7A5DDADBC0B008224  tests/pip-bootstrap-requirements.txt" | sha256sum --check --strict
          python -m pip install --disable-pip-version-check --require-hashes -r tests/pip-bootstrap-requirements.txt
          echo "20E818B72736FC95CEDF82FDE26413B8ABCC036809BAD72E25AAD93D327FCDA7  tests/legacy_pipeline-ci-requirements.txt" | sha256sum --check --strict
          python -m pip install --disable-pip-version-check --require-hashes -r tests/legacy_pipeline-ci-requirements.txt
      - name: Record pipeline toolchain provenance
        run: |
          python --version
          python -m pip --version
          python -m pip freeze --all
          cmake --version
          g++ --version
          make --version
      - name: Clean-build and test variant-nnue-tools
        run: |
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-tools-linux-v2 \
            --repository-root .pipeline/tools \
            --output "$RUNNER_TEMP/tools-build.json"
          make -C .pipeline/tools pin-tests verify-delegated-tsan tools-unit
          python .pipeline/tools/tests/tools_integration.py --engine .pipeline/tools/src/atomic-data-tools
      - name: Clean-build trainer native loader
        run: |
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-trainer-linux-v1 \
            --repository-root .pipeline/trainer \
            --output "$RUNNER_TEMP/trainer-build.json"
          ctest --test-dir .pipeline/trainer/build/pipeline-manifest-release -C Release --output-on-failure
      - name: Test trainer CPU surface
        working-directory: .pipeline/trainer
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python -m pytest -q -p no:cacheprovider
      - name: Clean-build and test Atomic-Stockfish
        run: |
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-atomic-linux-v2 \
            --repository-root . \
            --output "$RUNNER_TEMP/atomic-build.json"
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-atomic-data-generator-linux-v2 \
            --repository-root . \
            --output "$RUNNER_TEMP/atomic-data-generator-build.json"
          make -C src -j2 ARCH=x86-64 atomic-unit-tests
          make -C src -j2 ARCH=x86-64 atomic-api-tests
          make -C src -j2 ARCH=x86-64 legacy-atomic-v1-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-sink-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-manifest-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-manifest-reader-tests
          make -C src -j2 ARCH=x86-64 atomic-bin-v2-reader-tests
          bash tests/perft.sh src/atomic-stockfish
          python tests/atomic_search.py --candidate src/atomic-stockfish --use-nnue false
      - name: Enforce locked clean checkouts
        run: >-
          python tests/legacy_pipeline_lock.py verify-checkouts
          --tools-root .pipeline/tools
          --trainer-root .pipeline/trainer
          --atomic-root .
          --tools-engine .pipeline/tools/src/atomic-data-tools
          --engine src/atomic-stockfish
          --atomic-commit "$(git rev-parse HEAD)"
          --allow-unresolved-hashes
      - name: Measure unresolved synthetic pipeline fixture
        if: steps.pipeline_lock.outputs.synthetic_hashes_resolved == 'false'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          python tests/legacy_pipeline_e2e.py \
            --profile synthetic-ci \
            --tools-engine .pipeline/tools/src/atomic-data-tools \
            --trainer-root .pipeline/trainer \
            --engine src/atomic-stockfish-pipeline \
            --atomic-data-generator src/atomic-stockfish-data-generator-pipeline \
            --tools-build-manifest "$RUNNER_TEMP/tools-build.json" \
            --trainer-build-manifest "$RUNNER_TEMP/trainer-build.json" \
            --atomic-build-manifest "$RUNNER_TEMP/atomic-build.json" \
            --atomic-data-generator-build-manifest "$RUNNER_TEMP/atomic-data-generator-build.json" \
            --atomic-root . \
            --atomic-commit "$(git rev-parse HEAD)" \
            --measure-synthetic-fixture
          echo "::error title=Synthetic fixture lock update required::Copy the measured source_sha256 and Atomic-owned data_sha256 into tests/legacy_pipeline.lock.json, set hashes_resolved=true, and remove its placeholder."
          exit 1
      - name: Synthetic Legacy Atomic V1 E2E
        if: steps.pipeline_lock.outputs.synthetic_hashes_resolved == 'true'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: >-
          python tests/legacy_pipeline_e2e.py
          --profile synthetic-ci
          --tools-engine .pipeline/tools/src/atomic-data-tools
          --trainer-root .pipeline/trainer
          --engine src/atomic-stockfish-pipeline
