      - name: Build optimized real generator
        working-directory: src
        run: |
          make objclean
          make -j2 ARCH=x86-64 COMP=gcc COMPCXX=g++ data-generator
      - name: Run a real Atomic BIN V2 generator under Valgrind
        run: |
