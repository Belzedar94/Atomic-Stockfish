name: Atomic CI

on:
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: atomic-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native:
    name: Native ${{ matrix.compiler }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            comp: gcc
            cxx: g++
          - compiler: Clang
            comp: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build portable x86-64
        working-directory: src
        run: make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} build
      - name: C++ rule and shared-API units
        working-directory: src
        run: |
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-unit-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-api-tests
          make -j2 ARCH=x86-64 COMP=${{ matrix.comp }} COMPCXX=${{ matrix.cxx }} atomic-syzygy-driver
      - name: Atomic Syzygy source/domain contract
        run: python3 tests/atomic_syzygy.py --contract-only
      - name: Atomic and Atomic960 perft
        run: bash tests/perft.sh src/atomic-stockfish
      - name: Atomic search regressions
        run: python3 tests/atomic_search.py --candidate src/atomic-stockfish --use-nnue false
      - name: XBoard protocol
        run: python3 tests/xboard_protocol.py --candidate src/atomic-stockfish

  debug:
    name: Debug and assertions
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build debug engine
        working-directory: src
        run: make -j2 ARCH=x86-64 debug=yes optimize=no build
      - name: Debug units and perft
        run: |
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-unit-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-api-tests
          make -C src -j2 ARCH=x86-64 debug=yes optimize=no atomic-syzygy-driver
          bash tests/perft.sh src/atomic-stockfish
          python3 tests/atomic_search.py --candidate src/atomic-stockfish --use-nnue false

  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan and UBSan
            sanitizer: address,undefined
            mode: memory
          - name: TSan
            sanitizer: thread
            mode: thread
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Lower ASLR entropy for TSan
        if: matrix.mode == 'thread'
        run: sudo sysctl -w vm.mmap_rnd_bits=28
      - name: Build instrumented engine
        working-directory: src
        env:
          CXXFLAGS: -O1
        run: make -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no build
      - name: Memory-sanitized units
        if: matrix.mode == 'memory'
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-unit-tests
          CXXFLAGS=-O1 make -C src -j2 ARCH=x86-64-sse41-popcnt sanitize=${{ matrix.sanitizer }} debug=yes optimize=no atomic-api-tests
          bash tests/perft.sh src/atomic-stockfish
      - name: Instrumented XBoard workload
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1:log_path=tsan-report
        run: |
          set +e
          python3 tests/xboard_protocol.py --candidate src/atomic-stockfish
          status=$?
          if compgen -G 'tsan-report.*' > /dev/null; then
            cat tsan-report.*
          fi
          exit "$status"

  python:
    name: Python stable ABI (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --disable-pip-version-check -r tests/python-ci-requirements.txt
      - run: python setup.py build_ext --inplace
      - run: python test.py
      - run: python -m pytest -q tests/python/test_pyffish.py
      - run: >-
          python -m pytest -q
          tests/python/test_atomic_los_gate.py
          tests/python/test_atomic_compiler_preflight.py
          tests/python/test_legacy_pipeline_lock.py
          tests/python/test_legacy_pipeline_build_manifest.py
          tests/python/test_legacy_pipeline_e2e.py
      - run: python setup.py sdist --dist-dir dist/sdist
      - run: python tests/python/build_wheel_from_sdist.py dist/sdist dist/wheel
      - run: python tests/python/test_wheel_layout.py dist/wheel

  board-wasm:
    name: CommonJS and ES-module WASM
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build Board WASM
        run: >-
          docker run --rm
          --volume "$PWD:/src"
          --workdir /src/src
          emscripten/emsdk:3.1.46@sha256:2491bc4bf6caf8c41993660822341bc72759cb577363dfe0781f0a2d05f7d357
          make -f Makefile_js all
      - name: Test CommonJS and ES modules
        working-directory: tests/js
        run: npm test

  legacy-pipeline:
    name: Pinned Legacy Atomic V1 pipeline
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out Atomic-Stockfish
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10.18'
      - name: Resolve immutable sibling pins
        id: pipeline_lock
        run: >-
          python tests/legacy_pipeline_lock.py
          github-outputs --output "$GITHUB_OUTPUT"
          --allow-unresolved-hashes
      - name: Check out variant-nnue-tools at the locked commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.pipeline_lock.outputs.tools_repository }}
          ref: ${{ steps.pipeline_lock.outputs.tools_commit }}
          path: .pipeline/tools
          persist-credentials: false
      - name: Check out variant-nnue-pytorch at the locked commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.pipeline_lock.outputs.trainer_repository }}
          ref: ${{ steps.pipeline_lock.outputs.trainer_commit }}
          path: .pipeline/trainer
          persist-credentials: false
      - name: Install pinned CPU trainer dependencies
        run: |
          echo "1298F53B58B86B543F79AF4BB262838FE03B82F70D7892C7A5DDADBC0B008224  tests/pip-bootstrap-requirements.txt" | sha256sum --check --strict
          python -m pip install --disable-pip-version-check --require-hashes -r tests/pip-bootstrap-requirements.txt
          echo "20E818B72736FC95CEDF82FDE26413B8ABCC036809BAD72E25AAD93D327FCDA7  tests/legacy_pipeline-ci-requirements.txt" | sha256sum --check --strict
          python -m pip install --disable-pip-version-check --require-hashes -r tests/legacy_pipeline-ci-requirements.txt
      - name: Record pipeline toolchain provenance
        run: |
          python --version
          python -m pip --version
          python -m pip freeze --all
          cmake --version
          g++ --version
          make --version
      - name: Clean-build and test variant-nnue-tools
        run: |
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-tools-linux-v1 \
            --repository-root .pipeline/tools \
            --output "$RUNNER_TEMP/tools-build.json"
          bash .pipeline/tools/tests/tools_unit.sh
          python .pipeline/tools/tests/tools_integration.py --engine .pipeline/tools/src/stockfish
      - name: Clean-build trainer native loader
        run: |
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-trainer-linux-v1 \
            --repository-root .pipeline/trainer \
            --output "$RUNNER_TEMP/trainer-build.json"
          ctest --test-dir .pipeline/trainer/build/pipeline-manifest-release -C Release --output-on-failure
      - name: Test trainer CPU surface
        working-directory: .pipeline/trainer
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python -m pytest -q -p no:cacheprovider
      - name: Clean-build and test Atomic-Stockfish
        run: |
          python tests/legacy_pipeline_build_manifest.py \
            --recipe synthetic-ci-atomic-linux-v1 \
            --repository-root . \
            --output "$RUNNER_TEMP/atomic-build.json"
          make -C src -j2 ARCH=x86-64 atomic-unit-tests
          make -C src -j2 ARCH=x86-64 atomic-api-tests
          bash tests/perft.sh src/atomic-stockfish
          python tests/atomic_search.py --candidate src/atomic-stockfish --use-nnue false
      - name: Enforce locked clean checkouts
        run: >-
          python tests/legacy_pipeline_lock.py verify-checkouts
          --tools-root .pipeline/tools
          --trainer-root .pipeline/trainer
          --atomic-root .
          --tools-engine .pipeline/tools/src/stockfish
          --engine src/atomic-stockfish
          --atomic-commit "$(git rev-parse HEAD)"
          --allow-unresolved-hashes
      - name: Measure unresolved synthetic pipeline fixture
        if: steps.pipeline_lock.outputs.synthetic_hashes_resolved == 'false'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          python tests/legacy_pipeline_e2e.py \
            --profile synthetic-ci \
            --tools-engine .pipeline/tools/src/stockfish \
            --trainer-root .pipeline/trainer \
            --engine src/atomic-stockfish \
            --tools-build-manifest "$RUNNER_TEMP/tools-build.json" \
            --trainer-build-manifest "$RUNNER_TEMP/trainer-build.json" \
            --atomic-build-manifest "$RUNNER_TEMP/atomic-build.json" \
            --atomic-root . \
            --atomic-commit "$(git rev-parse HEAD)" \
            --measure-synthetic-fixture
          echo "::error title=Synthetic fixture lock update required::Copy the measured source_sha256 and data_sha256 into tests/legacy_pipeline.lock.json, set hashes_resolved=true, and remove its placeholder."
          exit 1
      - name: Synthetic Legacy Atomic V1 E2E
        if: steps.pipeline_lock.outputs.synthetic_hashes_resolved == 'true'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: >-
          python tests/legacy_pipeline_e2e.py
          --profile synthetic-ci
          --tools-engine .pipeline/tools/src/stockfish
          --trainer-root .pipeline/trainer
          --engine src/atomic-stockfish
          --tools-build-manifest "$RUNNER_TEMP/tools-build.json"
          --trainer-build-manifest "$RUNNER_TEMP/trainer-build.json"
          --atomic-build-manifest "$RUNNER_TEMP/atomic-build.json"
          --atomic-root .
          --atomic-commit "$(git rev-parse HEAD)"
